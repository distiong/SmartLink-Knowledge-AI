server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_base?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}

ai:
  api-key: ${AI_API_KEY:your_api_key_here}
  base-url: ${AI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  model: ${AI_MODEL:GLM-4-Flash}

milvus:
  service:
    url: ${MILVUS_SERVICE_URL:http://localhost:8081}

neo4j:
  enabled: ${NEO4J_ENABLED:false}
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:123456}

graph:
  data:
    path: ${GRAPH_DATA_PATH:./graph-data.json}

file:
  upload:
    path: ./uploads
    max-size: 10MB

jwt:
  secret: ${JWT_SECRET:AIKnowledgeBaseSystemSecretKeyForJWTTokenGeneration2024}
  expiration: 86400000
